    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Cache depends artifacts
        uses: actions/cache@v4
        with:
          path: |
            depends/built
            depends/i686-w64-mingw32
            depends/work
            depends/sources
          key: depends-${{ runner.os }}-mingw32-32-va-${{ hashFiles('depends/packages/**', 'depends/hosts/**', 'depends/**.mk', 'depends/Makefile') }}
          restore-keys: |
            depends-${{ runner.os }}-mingw32-32-va-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-mingw32-32-va-${{ hashFiles('configure.ac', 'Makefile.am', 'src/**', 'build-aux/**') }}
          restore-keys: |
            ccache-${{ runner.os }}-mingw32-32-va-

      - name: Update apt repos
        run: sudo apt-get update

      - name: Install base dependencies
        run: |
          sudo apt-get install -y \
          build-essential libtool gperf autotools-dev automake pkg-config \
          bsdmainutils curl git bison byacc python3 nsis ccache \
          g++-mingw-w64-i686 mingw-w64-i686-dev ninja-build flex nodejs

      - name: Force Posix
        run: sudo update-alternatives --set i686-w64-mingw32-g++ /usr/bin/i686-w64-mingw32-g++-posix

      - name: Build depends for MingW32 Cross Compile
        env:
          STRIP: "strip"
          V: "1"
        run: |
          set -euo pipefail
          cd depends/
          ( while true; do
              echo "---- depends heartbeat $(date -u +'%Y-%m-%dT%H:%M:%SZ') ----"
              ps -ef | egrep 'cmake|ninja|mingw|windres|ar|ranlib|ld|gcc|g\+\+|make|libtool' | grep -v egrep || true
              sleep 60
            done ) &
          HB=$!
          trap 'kill "$HB" || true' EXIT
          timeout 120m make HOST=i686-w64-mingw32 -j2 STRIP="${STRIP}" V="${V}" --output-sync=recurse

      - name: Auto generate
        run: ./autogen.sh

      - name: Export toolchain env (target)
        run: |
          echo "CC=i686-w64-mingw32-gcc-posix"          >> "$GITHUB_ENV"
          echo "CXX=i686-w64-mingw32-g++-posix"         >> "$GITHUB_ENV"
          echo "AR=i686-w64-mingw32-ar"                 >> "$GITHUB_ENV"
          echo "RANLIB=i686-w64-mingw32-ranlib"         >> "$GITHUB_ENV"
          echo "WINDRES=i686-w64-mingw32-windres"       >> "$GITHUB_ENV"
          echo "PKG_CONFIG=i686-w64-mingw32-pkg-config" >> "$GITHUB_ENV"
          echo "CCACHE_BASEDIR=$GITHUB_WORKSPACE"       >> "$GITHUB_ENV"
          echo "CCACHE_DIR=$HOME/.ccache"               >> "$GITHUB_ENV"
          echo "ARFLAGS=rcs"                            >> "$GITHUB_ENV"

      - name: Configure ccache
        env:
          CCACHE_DIR: ~/.ccache
        run: |
          mkdir -p ~/.ccache
          echo 'max_size = 2G' > ~/.ccache/ccache.conf
          echo 'compression = true' >> ~/.ccache/ccache.conf
          ccache -z || true

      - name: configure (Qt6 GUI required)
        run: |
          set -euo pipefail

          QT_HOST_PREFIX="$PWD/depends/i686-w64-mingw32/native/qt-host"
          QT_HOST_BIN="$QT_HOST_PREFIX/bin"
          QT_TARGET_PREFIX="$PWD/depends/i686-w64-mingw32"

          test -x "$QT_HOST_BIN/moc"
          test -x "$QT_HOST_BIN/uic"
          test -x "$QT_HOST_BIN/rcc"

          mkdir -p "$PWD/.qt-tool-aliases"
          ln -sf "$QT_HOST_BIN/moc" "$PWD/.qt-tool-aliases/moc-qt6"
          ln -sf "$QT_HOST_BIN/uic" "$PWD/.qt-tool-aliases/uic-qt6"
          ln -sf "$QT_HOST_BIN/rcc" "$PWD/.qt-tool-aliases/rcc-qt6"

          export PATH="$PWD/.qt-tool-aliases:$QT_HOST_BIN:$QT_HOST_PREFIX/libexec:$PWD/depends/i686-w64-mingw32/native/bin:$PATH"
          export MOC="$QT_HOST_BIN/moc"
          export UIC="$QT_HOST_BIN/uic"
          export RCC="$QT_HOST_BIN/rcc"

          echo "Qt target plugin dir snapshot:"
          find "$QT_TARGET_PREFIX/plugins/platforms" -maxdepth 1 -type f 2>/dev/null | sort || true
          echo "Qt target static resource object snapshot:"
          find "$QT_TARGET_PREFIX/lib/objects-Release" -type f \( \
            -name 'qrc_openglblacklists_init.cpp.obj' -o \
            -name 'qrc_cursors_init.cpp.obj' -o \
            -name 'qrc_gui_shaders_init.cpp.obj' \
          \) 2>/dev/null | sort || true
          if [ -f "$QT_TARGET_PREFIX/plugins/platforms/qwindows.prl" ]; then
            echo "qwindows.prl:"
            sed -n '1,80p' "$QT_TARGET_PREFIX/plugins/platforms/qwindows.prl"
          fi

          if ! CONFIG_SITE="$PWD/depends/i686-w64-mingw32/share/config.site" \
            ./configure --prefix=/ --disable-bench --disable-tests \
              --with-gui=qt6 \
              --with-qt-bindir="$QT_HOST_BIN"; then
            echo "configure failed; dumping Qt static plugin diagnostics from config.log"
            grep -nE "qwindows|QWindowsIntegrationPlugin|qdirect2d|Could not resolve|Qt6 static Windows integration plugin" config.log || true
            tail -n 240 config.log || true
            exit 1
          fi

          # Hard requirement: automake conditional ENABLE_QT must be enabled
          grep -Fq 'S["ENABLE_QT_TRUE"]=""' config.status

          # Hard requirement: verge-qt target exists in generated makefiles
          grep -Fq 'qt/verge-qt$(EXEEXT)' src/Makefile

          # Hard requirement: Qt6 windows static resource objects are present in link flags.
          # They are listed in qwindows/qdirect2d .prl, but autotools must wire them explicitly.
          if ! grep -nE 'qrc_(openglblacklists|cursors|gui_shaders)_init[.]cpp[.]obj' src/Makefile; then
            echo "ERROR: Missing Qt6 static resource object files in src/Makefile link flags"
            exit 1
          fi


      - name: make (serialized, verbose, heartbeat)
        env:
          STRIP: ""
          V: "1"
        run: |
          set -e
          ( while true; do
              echo "---- heartbeat $(date) ----"
              ps -ef | egrep 'mingw|windres|ar|ranlib|ld|gcc|g\+\+|libtool' | grep -v egrep || true
              sleep 60
            done ) &
          HB=$!
          timeout 60m make -j1 --output-sync=recurse
          kill "$HB" || true

      - name: strip (cross)
        run: |
          cd ./src && i686-w64-mingw32-strip verged.exe verge-cli.exe verge-tx.exe
          cd ./qt && i686-w64-mingw32-strip verge-qt.exe

      - name: Bundle win32 runtime for verge-qt
        run: |
          set -euo pipefail

          PREFIX="$PWD/depends/i686-w64-mingw32"
          BUNDLE="$PWD/release/windows32"

          mkdir -p "$BUNDLE/platforms" "$BUNDLE/plugins/platforms"

          cp "$PWD/src/verged.exe" "$BUNDLE/"
          cp "$PWD/src/verge-cli.exe" "$BUNDLE/"
          cp "$PWD/src/verge-tx.exe" "$BUNDLE/"
          cp "$PWD/src/qt/verge-qt.exe" "$BUNDLE/"

          copy_local_dll_deps() {
            local target="$1"
            i686-w64-mingw32-objdump -p "$target" \
              | awk '/DLL Name:/{print $3}' \
              | while read -r dll; do
                  [ -n "$dll" ] || continue
                  if [ -f "$BUNDLE/$dll" ] || [ -f "$BUNDLE/platforms/$dll" ]; then
                    continue
                  fi
                  local found=""
                  found="$(find "$PREFIX" -type f -iname "$dll" | head -n1 || true)"
                  if [ -n "$found" ] && [ -f "$found" ]; then
                    cp "$found" "$BUNDLE/"
                  fi
                done
          }

          copy_local_dll_deps_recursive() {
            local seed="$1"
            local prev_count=-1
            while true; do
              local cur_count
              cur_count="$(find "$BUNDLE" -maxdepth 1 -type f -iname '*.dll' | wc -l)"
              if [ "$cur_count" -eq "$prev_count" ]; then
                break
              fi
              prev_count="$cur_count"
              copy_local_dll_deps "$seed"
              find "$BUNDLE" -maxdepth 1 -type f -iname '*.dll' -print0 \
                | while IFS= read -r -d '' dllfile; do
                    copy_local_dll_deps "$dllfile"
                  done
            done
          }

          if i686-w64-mingw32-objdump -p "$BUNDLE/verge-qt.exe" | grep -qi 'Qt6Core.dll'; then
            echo "ERROR: dynamic Qt linkage detected in verge-qt.exe; windows32 build must be fully static"
            exit 1
          else
            echo "Detected static Qt linkage."
          fi

          QWINDOWS_DLL="$(find "$PREFIX" -type f -path '*/platforms/qwindows.dll' | head -n1 || true)"
          if [ -n "$QWINDOWS_DLL" ] && [ -f "$QWINDOWS_DLL" ]; then
            cp "$QWINDOWS_DLL" "$BUNDLE/platforms/"
            cp "$QWINDOWS_DLL" "$BUNDLE/plugins/platforms/"
            copy_local_dll_deps_recursive "$BUNDLE/platforms/qwindows.dll"
          fi

          copy_local_dll_deps_recursive "$BUNDLE/verge-qt.exe"

          test -f "$BUNDLE/verge-qt.exe"

      - name: Verify verge-qt binary shape and plugin linkage
        run: |
          set -euo pipefail
          EXE="$PWD/release/windows32/verge-qt.exe"
          test -f "$EXE"

          file "$EXE"
          i686-w64-mingw32-objdump -p "$EXE" | awk '/DLL Name:/{print}'

          if i686-w64-mingw32-objdump -p "$EXE" | grep -qi 'DLL Name:.*Qt6'; then
            echo "ERROR: dynamic Qt DLL dependency detected"
            exit 1
          fi

          if ! strings "$EXE" | grep -qi 'QWindowsIntegrationPlugin'; then
            echo "ERROR: QWindowsIntegrationPlugin string not found in verge-qt.exe"
            exit 1
          fi

      - name: ccache stats
        env:
          CCACHE_DIR: ~/.ccache
        run: ccache -s || true

      - uses: actions/upload-artifact@v4
        with:
          name: verge-windows32-ubuntu24
          path: /home/runner/work/verge/verge/release/windows32

