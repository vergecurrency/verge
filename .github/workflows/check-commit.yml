          if [ -f "$QT_TARGET_PREFIX/plugins/platforms/qwindows.prl" ]; then
            echo "qwindows.prl:"
            sed -n '1,80p' "$QT_TARGET_PREFIX/plugins/platforms/qwindows.prl"
          fi

          if ! CONFIG_SITE="$PWD/depends/x86_64-w64-mingw32/share/config.site" \
            ./configure --enable-scrypt-sse2 --prefix=/ --disable-bench --disable-tests \
              --with-gui=qt6 \
              --with-qt-bindir="$QT_HOST_BIN"; then
            echo "configure failed; dumping Qt static plugin diagnostics from config.log"
            grep -nE "qwindows|QWindowsIntegrationPlugin|qdirect2d|Could not resolve|Qt6 static Windows integration plugin" config.log || true
            tail -n 240 config.log || true
            exit 1
          fi

          # Hard requirement: automake conditional ENABLE_QT must be enabled
          grep -Fq 'S["ENABLE_QT_TRUE"]=""' config.status

          # Hard requirement: verge-qt target exists in generated makefiles
          grep -Fq 'qt/verge-qt$(EXEEXT)' src/Makefile

          # Hard requirement: Qt6 windows static resource objects are present in link flags.
          if ! grep -nE 'qrc_(openglblacklists|cursors|gui_shaders)_init[.]cpp[.]obj' src/Makefile; then
            echo "ERROR: Missing Qt6 static resource object files in src/Makefile link flags"
            exit 1
          fi

      - name: make (serialized, verbose, heartbeat)
        env:
          STRIP: ""
          V: "1"
        run: |
          set -euo pipefail
          mkdir -p "$PWD/.ccache-tmp"
          export CCACHE_TEMPDIR="$PWD/.ccache-tmp"
          ( while true; do
              echo "---- heartbeat $(date) ----"
              ps -ef | egrep 'mingw|windres|ar|ranlib|ld|gcc|g\+\+|libtool' | grep -v egrep || true
              sleep 60
            done ) &
          HB=$!
          trap 'kill "$HB" || true' EXIT
          timeout 60m make -j1 --output-sync=recurse
          kill "$HB" || true

      - name: strip (cross)
        run: |
          cd ./src && x86_64-w64-mingw32-strip verged.exe verge-cli.exe verge-tx.exe
          cd ./qt && x86_64-w64-mingw32-strip verge-qt.exe

      - name: Verify windows64 binary shape and static Qt linkage
        run: |
          set -euo pipefail
          for exe in "$PWD/src/verged.exe" "$PWD/src/verge-cli.exe" "$PWD/src/verge-tx.exe" "$PWD/src/qt/verge-qt.exe"; do
            test -f "$exe"
            file "$exe"
            x86_64-w64-mingw32-objdump -p "$exe" | awk '/DLL Name:/{print}'
          done

          if x86_64-w64-mingw32-objdump -p "$PWD/src/qt/verge-qt.exe" | grep -qi 'DLL Name:.*Qt6'; then
            echo "ERROR: dynamic Qt DLL dependency detected in verge-qt.exe"
            exit 1
          fi

          if ! strings "$PWD/src/qt/verge-qt.exe" | grep -qi 'QWindowsIntegrationPlugin'; then
            echo "ERROR: QWindowsIntegrationPlugin string not found in verge-qt.exe"
            exit 1
          fi

      - name: ccache stats
        env:
          CCACHE_DIR: ~/.ccache
        run: ccache -s || true

      - name: Dump config.log on failure
        if: failure()
        run: test -f config.log && sed -n '1,200p' config.log || true

      - uses: actions/upload-artifact@v4
        with:
          name: verge-windows64bit-ubuntu24
          path: |
            /home/runner/work/verge/verge/src/verged.exe
            /home/runner/work/verge/verge/src/verge-cli.exe
            /home/runner/work/verge/verge/src/verge-tx.exe
            /home/runner/work/verge/verge/src/qt/verge-qt.exe
