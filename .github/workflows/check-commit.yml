          }

          cleanup() {
            # Stop any app instance launched from the mounted DMG.
            pkill -f "$MOUNT_POINT/Verge-Qt.app/Contents/MacOS/verge-qt" || true
            pkill -f '/verge-qt' || true
            pkill -9 -f '/verge-qt' || true
            sleep 1
            detach_with_timeout "$MOUNT_DEVICE"
