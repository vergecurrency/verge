      - name: Brew link dependencies
        run: brew link qt berkeley-db@4 boost176

      - name: check cellar for openssl 
        run: cd /opt/homebrew/Cellar/openssl@3/ && ls
        
      - name: which clang/xcode
        run: clang --version

      - name: Add Qt tools to PATH
        run: |
          echo "$(brew --prefix qtbase)/bin" >> "$GITHUB_PATH"
          echo "$(brew --prefix qtbase)/libexec" >> "$GITHUB_PATH"
          echo "$(brew --prefix qt)/bin" >> "$GITHUB_PATH"
